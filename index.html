<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학X생명: 네온 프랙탈 성장 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #030712;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script>
let angleSlider, colorSlider;
let branchAngle;

function setup() {
    createCanvas(windowWidth, windowHeight);

    // 조작용 슬라이더 생성 (바이브 직접 튜닝!)
    angleSlider = createSlider(0, PI, PI / 6, 0.01);
    angleSlider.position(30, height - 50);
    angleSlider.style('width', '200px');

    colorSlider = createSlider(0, 360, 180, 1);
    colorSlider.position(30, height - 80);
    colorSlider.style('width', '200px');
}

function draw() {
    background(3, 7, 18, 50); // 신비로운 잔상 효과

    branchAngle = angleSlider.value(); // 슬라이더로 가지 각도 조절

    // UI 텍스트
    fill(255);
    noStroke();
    textSize(14);
    textAlign(LEFT);
    text("🌵 각도: " + degrees(branchAngle).toFixed(1) + "°", 250, height - 35);
    text("🎨 컬러 튜닝", 250, height - 65);
    fill(138, 247, 255);
    textSize(18);
    text("💻 수학X생명: 네온 프랙탈 성장 시뮬레이터", 30, 40);

    // 홀로그램 식물 그리기 시작 (화면 중앙 하단)
    translate(width / 2, height);
    drawBranch(200, 0); // 첫 번째 가지 (몸통)
}

// [수학적 핵심] 재귀 함수로 가지를 그리는 로직
function drawBranch(len, depth) {
    if (depth > 12) return; // 너무 많이 그리면 멈추므로 제한 (수학적 조건)

    // 컬러 계산 (층마다 색이 변하게!)
    let baseHue = colorSlider.value();
    let branchColor = color('hsb(' + ((baseHue + depth * 15) % 360) + ', 80%, 100%)');

    // 네온 홀로그램 느낌 (두꺼운 선 + 투명도)
    stroke(branchColor);
    strokeWeight(map(len, 10, 200, 1, 15)); // 가지가 가늘어지게
    line(0, 0, 0, -len);

    // 신비로운 네온 잔상 효과 그리기
    stroke(branchColor.levels[0], branchColor.levels[1], branchColor.levels[2], 50);
    strokeWeight(strokeWeight() * 3);
    line(0, 0, 0, -len);

    // 가지 끝으로 이동
    translate(0, -len);

    // [화학/생명 원리] 성장 호르몬 분포에 따른 가지치기
    // 왼쪽 가지 그리기
    push();
    rotate(branchAngle); // 수학적 회전
    drawBranch(len * 0.7, depth + 1); // 재귀 호출: 길이를 70%로 줄여서 다시 그리기
    pop();

    // 오른쪽 가지 그리기
    push();
    rotate(-branchAngle); // 반대 방향 회전
    drawBranch(len * 0.7, depth + 1); // 재귀 호출
    pop();
}

// 브라우저 창 크기가 바뀔 때 대응하는 최적화 코드
function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    angleSlider.position(30, height - 50);
    colorSlider.position(30, height - 80);
}
</script>

</body>
</html>
